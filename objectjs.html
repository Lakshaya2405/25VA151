<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        //objects {} - it is collection(pair) of keys(property) and its value.

        //create object - literal {} and new keyword

        // create object for student

        let student={
            id:101,name:"CHIKOO",
            age:19,
            isMarried:false,
            address:{
                streetno:11,
                area:"PRATAP VIHAR",
                pincode:201009,
                city:"GHAZIABAD"

            },
            education:["B.Tech","CSE",18,2025],
            getInfo:function(){
                return "my details are" +student.id +" and "+student.name
            },
            examDone:null

        };

        //console.log(student);
       // console.log(typeof(student));
       //acess object's properties/keys using dot notation
       // console.log(student.examDone);
       // find object's keys in object

        console.log('id' in student);

       // delete object's key from object

       console.log(delete student.name);
       console.log(student);

       // object 's length

       let StudentKeys=Object.keys(student);
       console.log(StudentKeys.length);

       // iterate keys of object
       // using for----loop

       for(let i=0;i<StudentKeys.length;i++){
        console.log(student[StudentKeys[i]]);
       }

       // using for in loop

       for(let x in student){
        console.log(student[x]);
       }

       // create an object using new keyword

       let myInfo=new Object();
       myInfo.name="CHIKOO";
       myInfo.age=18;
       myInfo.isMarried=true;
       myInfo.city="GHAZIABAD";

      // acess object's properties/keys using dot notation

      console.log(myInfo);
      console.log(myInfo.city);

      // acess object's property using []notation

      console.log(myInfo['age']);
      
    </script>
</body>
</html>
